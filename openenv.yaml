name: clinical_triage_env
version: 1.0.0
description: Emergency department triage – assign urgency, order tests, ask questions.
authors:
  - Murali Sai Rama Krishna Veligeti
tags:
  - real-world
  - healthcare
  - clinical-triage
observation_space:
  age: integer
  heart_rate: integer
  systolic_bp: integer
  oxygen_saturation: integer
  temperature: float
  pain_level: integer
  chronic_disease_count: integer
  previous_er_visits: integer
  arrival_mode: string
  chief_complaint: string
  medical_history: string
action_space:
  order_test: optional string
  ask_question: optional string
  assign_triage: optional integer
reward_range: [-0.5, 1.0]
tasks:
  easy: { difficulty: easy, description: "Stable patient with sore throat → triage 3" }
  medium: { difficulty: medium, description: "COPD exacerbation, hypoxia → triage 1" }
  hard: { difficulty: hard, description: "Acute MI, shock → triage 0" }